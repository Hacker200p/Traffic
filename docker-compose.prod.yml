# =============================================================================
# Production Docker Compose — Autonomous Traffic Light Control System
# Usage:
#   cp .env.production .env
#   docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:

  # ── Nginx Reverse Proxy (Gateway) ──────────────────────────────────────────
  gateway:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    container_name: traffic_gateway
    restart: always
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
      - "8080:8080"   # nginx_status (internal monitoring)
    volumes:
      - gateway_logs:/var/log/nginx
      # Uncomment for TLS:
      # - ./deploy/ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./deploy/ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - traffic_public
      - traffic_internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "gateway"

  # ── PostgreSQL + PostGIS ───────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: traffic_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-traffic_control}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      # Perf tuning (adjust to server RAM)
      POSTGRES_SHARED_BUFFERS: "256MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "768MB"
      POSTGRES_WORK_MEM: "16MB"
    ports:
      - "${DB_EXTERNAL_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/database/migrations/002_integration_updates.sql:/docker-entrypoint-initdb.d/02-integration.sql:ro
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-traffic_control}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - traffic_internal
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "postgres"

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: traffic_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
      --save 900 1
      --save 300 10
    ports:
      - "${REDIS_EXTERNAL_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - traffic_internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "redis"

  # ── Backend API (Node.js) ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic_app
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-traffic_control}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
      DB_POOL_MAX: ${DB_POOL_MAX:-30}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: 0
      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      # CORS — in production the gateway is the only origin
      CORS_ORIGINS: ${CORS_ORIGINS:-https://traffic.example.com}
      # Rate limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-200}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
      # WebSocket
      WS_PING_INTERVAL: 25000
      WS_PING_TIMEOUT: 20000
      # Service auth (AI ↔ Backend)
      SERVICE_API_KEY: ${SERVICE_API_KEY:?SERVICE_API_KEY is required}
      SERVICE_SYSTEM_USER_ID: ${SERVICE_SYSTEM_USER_ID:-00000000-0000-0000-0000-000000000001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    networks:
      - traffic_internal
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M
      # Horizontal scaling — uncomment to run multiple instances
      # replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
        tag: "backend"

  # ── AI Microservice (Python / FastAPI) ─────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: traffic_ai
    restart: always
    expose:
      - "8001"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8001
      ENV: production
      # Backend connectivity
      BACKEND_API_URL: http://app:3000/api/v1
      BACKEND_API_KEY: ${SERVICE_API_KEY:?SERVICE_API_KEY is required}
      BACKEND_TIMEOUT: 30
      # Models
      YOLO_VEHICLE_MODEL: ${YOLO_VEHICLE_MODEL:-yolov8n.pt}
      YOLO_HELMET_MODEL: ${YOLO_HELMET_MODEL:-yolov8n.pt}
      YOLO_PLATE_MODEL: ${YOLO_PLATE_MODEL:-yolov8n.pt}
      # Thresholds
      VEHICLE_CONFIDENCE: ${VEHICLE_CONFIDENCE:-0.45}
      HELMET_CONFIDENCE: ${HELMET_CONFIDENCE:-0.50}
      PLATE_CONFIDENCE: ${PLATE_CONFIDENCE:-0.40}
      RED_LIGHT_CONFIDENCE: ${RED_LIGHT_CONFIDENCE:-0.50}
      DENSITY_LOW_THRESHOLD: ${DENSITY_LOW_THRESHOLD:-5}
      DENSITY_MEDIUM_THRESHOLD: ${DENSITY_MEDIUM_THRESHOLD:-15}
      DENSITY_HIGH_THRESHOLD: ${DENSITY_HIGH_THRESHOLD:-30}
      # OCR
      OCR_LANGUAGES: ${OCR_LANGUAGES:-en}
      OCR_GPU: ${OCR_GPU:-false}
      # Limits
      MAX_IMAGE_SIZE: 4096
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-4}
      # Logging
      LOG_LEVEL: ${AI_LOG_LEVEL:-INFO}
      LOG_DIR: /app/logs
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ai_models:/app/models
      - ai_logs:/app/logs
    networks:
      - traffic_internal
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          memory: 2G
      # GPU support — uncomment for NVIDIA GPU inference
      # resources:
      #   reservations:
      #     devices:
      #       - driver: nvidia
      #         count: 1
      #         capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
        tag: "ai-service"

  # ── Frontend Dashboard (React + nginx) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    container_name: traffic_frontend
    restart: always
    expose:
      - "80"
    networks:
      - traffic_internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
        tag: "frontend"

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  ai_models:
    driver: local
  ai_logs:
    driver: local
  gateway_logs:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  traffic_public:
    # Only the gateway joins this network (exposed to the internet)
    driver: bridge
  traffic_internal:
    # All services join this network (no external access)
    driver: bridge
    internal: true
