# =============================================================================
# PostgreSQL 16 — Production configuration
# Tuned for a server with 2–4 GB RAM dedicated to Postgres.
# Adjust values if running on larger/smaller hardware.
# =============================================================================

# ── Connection ───────────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# ── Memory ───────────────────────────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 16MB
maintenance_work_mem = 128MB
temp_buffers = 8MB

# ── WAL / Durability ────────────────────────────────────────────────────────
wal_level = replica
max_wal_size = 1GB
min_wal_size = 256MB
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# ── Query Planner ────────────────────────────────────────────────────────────
random_page_cost = 1.1          # SSD storage
effective_io_concurrency = 200  # SSD storage
default_statistics_target = 100

# ── Logging ──────────────────────────────────────────────────────────────────
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 500   # Log queries slower than 500ms
log_checkpoints = on
log_connections = off               # Reduce noise in prod
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%t [%p] %u@%d '

# ── Autovacuum ───────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 60
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# ── Locale / Timezone ────────────────────────────────────────────────────────
timezone = 'UTC'
lc_messages = 'en_US.utf8'

# ── Security ─────────────────────────────────────────────────────────────────
password_encryption = scram-sha-256
ssl = off                           # TLS handled by nginx gateway
