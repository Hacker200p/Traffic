# =============================================================================
# Nginx Reverse Proxy — Production Gateway
# Single entry point for ALL traffic (API, WebSocket, Frontend)
# TLS termination, rate limiting, security headers, load-balancing
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging format ───────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time';

    log_format  json  escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log  /var/log/nginx/access.log  json;

    # ── Performance ──────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Security ─────────────────────────────────────────────────────────
    server_tokens off;

    # Limit request body (10MB for image uploads to AI service)
    client_max_body_size 10m;
    client_body_timeout  30s;
    client_header_timeout 15s;

    # ── Rate limiting zones ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m  rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ai_detect:10m    rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # ── Upstream pools ───────────────────────────────────────────────────
    upstream backend {
        least_conn;
        server app:3000        max_fails=3 fail_timeout=30s;
        # Scale: add more instances here
        # server app-2:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream ai_service {
        least_conn;
        server ai-service:8001 max_fails=3 fail_timeout=30s;
        # server ai-service-2:8001 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream frontend {
        server frontend:80     max_fails=3 fail_timeout=30s;
    }

    # ── Map for WebSocket upgrade ────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ==================================================================
    # HTTP → HTTPS redirect (uncomment when TLS cert is available)
    # ==================================================================
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$server_name$request_uri;
    # }

    # ==================================================================
    # Main server — port 80 (or 443 with TLS)
    # ==================================================================
    server {
        listen 80;
        # listen 443 ssl http2;
        server_name _;

        # ── TLS (uncomment + provide certs) ──────────────────────────────
        # ssl_certificate      /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key  /etc/nginx/ssl/privkey.pem;
        # ssl_protocols        TLSv1.2 TLSv1.3;
        # ssl_ciphers          HIGH:!aNULL:!MD5:!RC4;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache    shared:SSL:10m;
        # ssl_session_timeout  10m;
        # ssl_stapling         on;
        # ssl_stapling_verify  on;

        # ── Security headers ─────────────────────────────────────────────
        add_header X-Frame-Options            "SAMEORIGIN"       always;
        add_header X-Content-Type-Options     "nosniff"          always;
        add_header X-XSS-Protection           "1; mode=block"    always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        # Uncomment for HSTS once TLS is confirmed working:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Backend API ──────────────────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api_general burst=60 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # Stricter rate limit for auth endpoints
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=10 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── WebSocket (Socket.io) ───────────────────────────────────────
        location /socket.io/ {
            limit_conn ws_conn 100;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout     86400s;   # keep WS alive for 24h
            proxy_send_timeout     86400s;
            proxy_connect_timeout  5s;
        }

        # ── AI Service direct access (camera feeds, admin tools) ─────────
        location /ai/ {
            limit_req zone=ai_detect burst=20 nodelay;

            # Strip /ai/ prefix before forwarding
            rewrite ^/ai/(.*) /api/v1/$1 break;

            proxy_pass         http://ai_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  10s;
            proxy_send_timeout     120s;  # AI inference can be slow
            proxy_read_timeout     120s;

            client_max_body_size   20m;   # larger for image uploads
        }

        # ── Health endpoints (no rate limit) ─────────────────────────────
        location = /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location = /ai/health {
            rewrite ^/ai/health /api/v1/health break;
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Frontend SPA ─────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Static asset caching (if frontend serves them directly) ──────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Block common exploit paths ───────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi)$ {
            return 444;
        }

        # ── Custom error pages ───────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
            internal;
        }
    }

    # ==================================================================
    # Internal status endpoint (for monitoring / Prometheus)
    # ==================================================================
    server {
        listen 8080;
        server_name _;

        location /nginx_status {
            stub_status on;
            access_log off;
            # Only allow internal Docker network
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }
    }
}
